<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- Background -->
  <rect width="300" height="200" fill="#f0f4ff" rx="12"/>

  <!-- Chat bubble - wrong (red) -->
  <rect x="20" y="30" width="170" height="52" rx="12" fill="#fee2e2"/>
  <polygon points="60,82 40,100 80,82" fill="#fee2e2"/>
  <text x="105" y="53" font-family="Georgia, serif" font-size="11" fill="#991b1b" text-anchor="middle">My condescending</text>
  <text x="105" y="70" font-family="Georgia, serif" font-size="10" fill="#dc2626" text-anchor="middle">❌ What I typed</text>

  <!-- Arrow -->
  <text x="220" y="80" font-size="22" fill="#6b7280" text-anchor="middle">→</text>

  <!-- Chat bubble - correct (green) -->
  <rect x="20" y="115" width="170" height="52" rx="12" fill="#dcfce7"/>
  <polygon points="60,115 40,97 80,115" fill="#dcfce7"/>
  <text x="105" y="138" font-family="Georgia, serif" font-size="11" fill="#166534" text-anchor="middle">My condolences</text>
  <text x="105" y="155" font-family="Georgia, serif" font-size="10" fill="#16a34a" text-anchor="middle">✅ What I meant</text>

  <!-- Lightbulb label -->
  <text x="150" y="185" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Common mix-up!</text>
</svg>
